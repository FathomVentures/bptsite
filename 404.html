<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Page Not Found | Black Phoenix Tech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .notFound {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 3rem 0;
      }

      .notFound__card {
        border-radius: var(--radius);
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.04));
        box-shadow: var(--shadow);
        padding: 1.6rem;
        max-width: 52rem;
      }

      .notFound__title {
        margin: 0 0 0.75rem;
        font-family: Orbitron, Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        letter-spacing: -0.02em;
        font-size: clamp(2rem, 1.4rem + 2.2vw, 3rem);
        line-height: 1.05;
      }

      .notFound__text {
        margin: 0 0 1.25rem;
        color: var(--muted);
        font-size: 1.02rem;
      }

      .notFound__actions {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        align-items: center;
      }

      .notFound__hint {
        margin: 1rem 0 0;
        color: var(--muted2);
        font-size: 0.95rem;
      }

      .notFound__code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        color: rgba(255, 255, 255, 0.88);
        background: rgba(0, 0, 0, 0.28);
        border: 1px solid rgba(255, 255, 255, 0.14);
        padding: 0.2rem 0.45rem;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <main id="main">
      <section class="notFound" aria-label="Page not found">
        <div class="container">
          <div class="notFound__card">
            <p class="eyebrow">Error 404</p>
            <h1 class="notFound__title">Page not found</h1>
            <p class="notFound__text">
              The page you’re looking for doesn’t exist (or may have been moved).
            </p>

            <div class="notFound__actions">
              <a class="button" href="/">Back to home</a>
              <a class="button button--ghost" href="index.html#contact">Contact</a>
            </div>

            <p class="notFound__hint">If you typed the URL manually, double-check the spelling.</p>
            <p class="notFound__hint">Requested path: <span class="notFound__code" id="requestedPath">/</span></p>
          </div>
        </div>
      </section>
    </main>

    <script>
      const el = document.getElementById('requestedPath');
      if (el) el.textContent = window.location.pathname + window.location.search + window.location.hash;
    </script>
  </body>
</html>
